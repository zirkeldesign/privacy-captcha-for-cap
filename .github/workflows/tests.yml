name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: composer format:test

  phpstan:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer phpstan

  javascript:
    name: JavaScript assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify vendored cap-widget + WASM are up to date
        run: bun run build:check

  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test

  zip-audit:
    name: Build + audit release zip
    runs-on: ubuntu-latest
    needs: [lint, phpstan, javascript, tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2, wp-cli

      - name: Install runtime composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install wp-cli dist-archive package
        run: wp package install wp-cli/dist-archive-command:@stable --allow-root

      - name: Build distribution archive
        run: |
          mkdir -p dist
          VERSION=$(php get-version.php)
          wp dist-archive . dist/cap-captcha-"${VERSION}".zip --allow-root
          ls -lh dist/

      - name: Audit zip for hidden / dev files
        run: |
          set -e
          ZIP=$(ls dist/cap-captcha-*.zip | head -1)
          unzip -l "$ZIP" | awk '{print $4}' \
            | grep -E "/\.[^/]+$|^cap-captcha/\.[^/]+|tests/|node_modules/|composer\.lock|get-version\.php" \
            > /tmp/leak.txt || true
          if [ -s /tmp/leak.txt ]; then
            echo "❌ Leaked files in zip — check .distignore:"
            cat /tmp/leak.txt
            exit 1
          fi
          echo "✅ Zip is clean"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: cap-captcha-zip
          path: dist/*.zip
          retention-days: 30
